<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | LIBRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="logo"><a href="homePage.html">LIBRO<span>.</span></a></h2>
                <p>Створіть свій аккаунт для затишного читання</p>
            </div>

            <form name="singUp" onsubmit="return validateForm()" novalidate>
                <div class="form-group">
                    <label for="name">Прізвище та ім'я</label>
                    <input type="text" id="name">
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" placeholder="example@mail.com">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password">
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms">
                    <label for="terms">Я згоден з умовами використання</label>
                </div>
                
                <p id="error" class="error-message"></p>
                <button type="submit" class="btn-auth">Зареєструватися</button>
            </form>

            <script src="singUp_validation.js"></script>
            
            <div class="auth-footer">
                <p>Вже маєте профіль? <a href="LogIn.html">Увійти</a></p>
            </div>
        </div>
    </div>
</body>
</html>
