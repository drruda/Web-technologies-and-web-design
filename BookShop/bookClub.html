<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація на книжковий клуб</title>
</head>

<body>
    <form>
        <h2>Реєстрація на книжковий клуб</h2>
        <p>
            Прізвище: <input type="text" name="surname"><br><br>
            Ім'я: <input type="text" name="name"><br><br>
            Номер телефону: <input type="phone" name="phone" placeholder="+380"><br>
        </p>

        <hr>
        <p>
            Підготувати для Вас особистий примірник на зустріч?<br>
            <input type="radio" name="personal_copy" value="yes"> Так<br>
            <input type="radio" name="personal_copy" value="no"> Ні<br>
        </p>

        <button type="submit">Відправити</button>
        <button type="reset">Скасувати</button>
    </form>
</body>

</html>
