<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | LIBRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="logo">LIBRO<span>.</span></h2>
                <p>Створіть свій аккаунт для затишного читання</p>
            </div>

            <form name="singUp" onsubmit="return validateForm()" novalidate>
                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" placeholder="example@mail.com">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password">
                </div>

                <p id="error" class="error-message"></p>
                <button type="submit" class="btn-auth">Увійти</button>
            </form>

            <script src="logIn_validation.js"></script>

            <div class="auth-footer">
                <p>Ще не маєте профіля? <a href="SignUp.html">Зареєструватися</a></p>
            </div>
        </div>
    </div>
</body>
</html>
