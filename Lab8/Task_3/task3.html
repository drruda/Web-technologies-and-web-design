<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class="slider">
        <div class="item">
            <img src="slide1.jpg" alt="Slide 1">
            <div class="slideText">Кафе-книгарня</div>
        </div>

        <div class="item">
            <img src="slide2.jpg" alt="Slide 2">
            <div class="slideText">Шкільна література. Другий шанс</div>
        </div>

        <div class="item">
            <img src="slide3.jpg" alt="Slide 3">
            <div class="slideText">Запрошуємо на наш книжковий клуб</div>
        </div>

        <div class="item">
            <img src="slide4.jpg" alt="Slide 4">
            <div class="slideText">Книжковий обмін</div>
        </div>
        
        <a class="prev" onclick="minusSlide()">&#10094;</a>
        <a class="next" onclick="plusSlide()">&#10095;</a>

        <div class="slider-dots">
            <span class="slider-dots_item" onclick="currentSlide(1)"></span>
            <span class="slider-dots_item" onclick="currentSlide(2)"></span>
            <span class="slider-dots_item" onclick="currentSlide(3)"></span>
            <span class="slider-dots_item" onclick="currentSlide(4)"></span>
        </div>
    </div>

    <script src="script3.js"></script>
</body>
</html>
